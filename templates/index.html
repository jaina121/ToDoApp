<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Vibe Todo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<main class="shell">
    <section class="hero">
        <p class="eyebrow">AI-assisted project</p>
        <h1>AI Vibe Todo App</h1>
        <p class="subtitle">A structured Flask todo project with AI instruction files, JSON storage, and a simple task workflow.</p>
    </section>

    <section class="panel">
        <div id="toast" class="toast" aria-live="polite" aria-atomic="true"></div>

        <div class="stats">
            <div class="stat-card">
                <span class="stat-label">Completed</span>
                <strong id="completed-count">0</strong>
            </div>
            <div class="stat-card">
                <span class="stat-label">Remaining</span>
                <strong id="remaining-count">0</strong>
            </div>
            <div class="stat-card">
                <span class="stat-label">Progress</span>
                <strong id="progress-count">0%</strong>
            </div>
        </div>

        <div class="composer">
            <input id="task" type="text" placeholder="Add a new task">
            <input id="deadline" type="date" aria-label="Task deadline">
            <button onclick="addTask()">Add task</button>
        </div>

        <div class="filters">
            <button class="filter active" data-filter="all" onclick="setFilter('all')">All</button>
            <button class="filter" data-filter="active" onclick="setFilter('active')">Active</button>
            <button class="filter" data-filter="done" onclick="setFilter('done')">Done</button>
        </div>

        <div class="suggestion-box">
            <div class="suggestion-head">
                <input id="suggestion-input" type="text" placeholder="Ask for subtasks, e.g. study math or build app">
                <button class="ghost suggestion-button" onclick="suggestTasks()">Suggest subtasks</button>
            </div>
            <ul id="suggestions" class="suggestion-list"></ul>
            <button id="add-suggestions-button" class="ghost add-suggestions-button" onclick="addSuggestedTasks()" disabled>Add all subtasks</button>
        </div>

        <p class="hint">You can add, edit, mark complete, and delete tasks.</p>
        <ul id="list" class="task-list"></ul>
    </section>
</main>

<script>
let tasks = [];
let currentFilter = "all";
let toastTimer = null;
let suggestionItems = [];

async function load() {
    const response = await fetch("/tasks");
    tasks = await response.json();
    renderTasks();
    updateStats(tasks);
}

function renderTasks() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    const sortedTasks = [...tasks].sort((firstTask, secondTask) => {
        const firstRank = taskSortRank(firstTask);
        const secondRank = taskSortRank(secondTask);

        if (firstRank !== secondRank) {
            return firstRank - secondRank;
        }

        return firstTask.text.localeCompare(secondTask.text);
    });

    const visibleTasks = sortedTasks.filter((task) => {
        if (currentFilter === "active") {
            return !task.done;
        }

        if (currentFilter === "done") {
            return task.done;
        }

        return true;
    });

    if (visibleTasks.length === 0) {
        list.innerHTML = '<li class="empty">No tasks yet.</li>';
        return;
    }

    visibleTasks.forEach((task) => {
        const actualIndex = tasks.indexOf(task);
        const item = document.createElement("li");
        const classes = ["task"];

        if (task.done) {
            classes.push("done");
        }

        if (isOverdue(task.deadline, task.done)) {
            classes.push("overdue");
        }

        item.className = classes.join(" ");

        item.innerHTML = `
            <label class="task-text">
                <input type="checkbox" ${task.done ? "checked" : ""} onchange="toggle(${actualIndex})">
                <span>${escapeHtml(task.text)}</span>
            </label>
            ${task.deadline ? `<span class="deadline-badge ${isOverdue(task.deadline, task.done) ? 'late' : ''}">${deadlineLabel(task.deadline, task.done)}</span>` : ''}
            <div class="task-actions">
                <button class="ghost" onclick="editTask(${actualIndex})">Edit</button>
                <button class="ghost danger" onclick="deleteTask(${actualIndex})">Delete</button>
            </div>
        `;

        list.appendChild(item);
    });
}

function setFilter(filter) {
    currentFilter = filter;
    document.querySelectorAll(".filter").forEach((button) => {
        button.classList.toggle("active", button.dataset.filter === filter);
    });
    renderTasks();
}

async function addTask() {
    const input = document.getElementById("task");
    const deadlineInput = document.getElementById("deadline");
    const text = input.value.trim();
    const deadline = deadlineInput.value;

    if (!text) {
        showToast("Type a task before adding it.", "error");
        return;
    }

    const response = await fetch("/add", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ text, deadline })
    });

    const result = await response.json();

    if (!response.ok) {
        showToast(result.message || "Could not add task.", "error");
        return;
    }

    input.value = "";
    deadlineInput.value = "";
    showToast(deadline ? `Task added. Reminder set for ${formatDeadline(deadline)}.` : "Task added successfully.", "success");
    notifyTaskCreated(text, deadline);
    load();
}

async function toggle(index) {
    const response = await fetch("/toggle", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ index })
    });

    if (!response.ok) {
        showToast("Could not update task.", "error");
        return;
    }

    showToast("Task status updated.", "success");
    load();
}

async function editTask(index) {
    const nextText = prompt("Edit task text", tasks[index].text);

    if (nextText === null) {
        return;
    }

    const text = nextText.trim();

    if (!text) {
        return;
    }

    const response = await fetch("/update", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ index, text })
    });

    if (!response.ok) {
        const result = await response.json();
        showToast(result.message || "Could not update task.", "error");
        return;
    }

    showToast("Task updated successfully.", "success");
    load();
}

async function deleteTask(index) {
    if (!confirm("Delete this task?")) {
        return;
    }

    const response = await fetch("/delete", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ index })
    });

    if (!response.ok) {
        showToast("Could not delete task.", "error");
        return;
    }

    showToast("Task deleted.", "success");
    load();
}

function showToast(message, type = "success") {
    const toast = document.getElementById("toast");
    toast.textContent = message;
    toast.className = `toast visible ${type}`;

    if (toastTimer) {
        clearTimeout(toastTimer);
    }

    toastTimer = setTimeout(() => {
        toast.className = "toast";
        toast.textContent = "";
    }, 2400);
}

async function notifyTaskCreated(text, deadline) {
    if (!("Notification" in window)) {
        return;
    }

    if (Notification.permission === "default") {
        const permission = await Notification.requestPermission();
        if (permission !== "granted") {
            return;
        }
    }

    if (Notification.permission !== "granted") {
        return;
    }

    const body = deadline
        ? `Deadline set for ${formatDeadline(deadline)}.`
        : "No deadline set yet.";

    const notification = new Notification("New task added", {
        body: `${text}. ${body}`,
    });

    setTimeout(() => notification.close(), 4000);
}

async function suggestTasks() {
    const input = document.getElementById("suggestion-input");
    const text = input.value.trim();

    if (!text) {
        showToast("Type a task to generate subtasks.", "error");
        return;
    }

    const response = await fetch("/suggest", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ text })
    });

    const result = await response.json();

    if (!response.ok) {
        showToast(result.message || "Could not generate subtasks.", "error");
        return;
    }

    suggestionItems = result.suggestions || [];
    renderSuggestions();
    toggleSuggestionButton();
    showToast("Subtasks generated.", "success");
}

function renderSuggestions() {
    const list = document.getElementById("suggestions");

    if (suggestionItems.length === 0) {
        list.innerHTML = "";
        return;
    }

    list.innerHTML = suggestionItems.map((item) => `<li>${escapeHtml(item)}</li>`).join("");
}

function toggleSuggestionButton() {
    document.getElementById("add-suggestions-button").disabled = suggestionItems.length === 0;
}

async function addSuggestedTasks() {
    if (suggestionItems.length === 0) {
        showToast("Generate subtasks first.", "error");
        return;
    }

    const createRequests = suggestionItems.map((text) => {
        return fetch("/add", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ text })
        });
    });

    const responses = await Promise.all(createRequests);
    const hasError = responses.some((response) => !response.ok);

    if (hasError) {
        showToast("Some subtasks could not be added.", "error");
        return;
    }

    suggestionItems = [];
    renderSuggestions();
    toggleSuggestionButton();
    showToast("Subtasks added to your task list.", "success");
    load();
}

function updateStats(taskList) {
    const completed = taskList.filter((task) => task.done).length;
    const remaining = taskList.length - completed;
    const progress = taskList.length === 0 ? 0 : Math.round((completed / taskList.length) * 100);

    document.getElementById("completed-count").textContent = completed;
    document.getElementById("remaining-count").textContent = remaining;
    document.getElementById("progress-count").textContent = `${progress}%`;
}

function escapeHtml(value) {
    return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
}

function formatDeadline(deadline) {
    const dateValue = new Date(`${deadline}T00:00:00`);
    return dateValue.toLocaleDateString("en-GB", {
        day: "numeric",
        month: "short",
        year: "numeric"
    });
}

function deadlineLabel(deadline, done) {
    if (done) {
        return `Done by ${formatDeadline(deadline)}`;
    }

    const selectedDate = new Date(`${deadline}T00:00:00`);
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    const tomorrow = new Date(today);
    tomorrow.setDate(today.getDate() + 1);

    if (selectedDate.getTime() === today.getTime()) {
        return `Today · ${formatDeadline(deadline)}`;
    }

    if (selectedDate.getTime() === tomorrow.getTime()) {
        return `Tomorrow · ${formatDeadline(deadline)}`;
    }

    return formatDeadline(deadline);
}

function isOverdue(deadline, done) {
    if (done) {
        return false;
    }

    const selectedDate = new Date(`${deadline}T00:00:00`);
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    return selectedDate < today;
}

function taskSortRank(task) {
    if (!task.deadline) {
        return Number.MAX_SAFE_INTEGER;
    }

    const timeValue = new Date(`${task.deadline}T00:00:00`).getTime();
    return Number.isFinite(timeValue) ? timeValue : Number.MAX_SAFE_INTEGER;
}

document.getElementById("task").addEventListener("keydown", (event) => {
    if (event.key === "Enter") {
        addTask();
    }
});

document.getElementById("suggestion-input").addEventListener("keydown", (event) => {
    if (event.key === "Enter") {
        suggestTasks();
    }
});

toggleSuggestionButton();

load();
</script>
</body>
</html>
